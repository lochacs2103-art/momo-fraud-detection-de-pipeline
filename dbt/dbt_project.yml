    search_order: ['momo_fraud', 'dbt']

models:
  momo_fraud:
    staging:
      +materialized: view
      +schema: staging
    warehouse:
      +materialized: incremental
      +schema: warehouse
    marts:
      +materialized: table
      +schema: warehouse
