# Trino coordinator config
# Trong dev: coordinator và worker là cùng 1 node (single-node mode)
# Production: coordinator riêng, nhiều worker nodes riêng

coordinator=true
node-scheduler.include-coordinator=true

# HTTP port — Superset và dbt connect vào đây
http-server.http.port=8080

# Bộ nhớ tối đa cho 1 query
query.max-memory=2GB
query.max-memory-per-node=1GB
query.max-total-memory-per-node=2GB

# Discovery server — trong single-node mode, coordinator tự là discovery server
discovery-server.enabled=true
discovery.uri=http://localhost:8080
