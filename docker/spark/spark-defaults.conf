# Spark default config — áp dụng cho tất cả Spark jobs trong project
# Có thể override ở từng job nếu cần

# --- Hive Metastore Integration ---
# Spark dùng Hive Metastore làm catalog — biết table nào ở HDFS path nào
spark.sql.catalogImplementation=hive
spark.hive.metastore.uris=thrift://hive-metastore:9083

# Parquet đọc/ghi thông qua Hive Metastore catalog
spark.sql.hive.metastore.version=3.1.3
spark.sql.hive.metastore.jars=builtin

# --- Adaptive Query Execution (AQE) ---
# Luôn bật — Spark 3.0+ tự optimize query plan ở runtime
spark.sql.adaptive.enabled=true
spark.sql.adaptive.coalescePartitions.enabled=true
spark.sql.adaptive.skewJoin.enabled=true
# Target size cho mỗi partition sau khi AQE coalesce: 128MB
spark.sql.adaptive.advisoryPartitionSizeInBytes=134217728

# --- Broadcast Join ---
# Table nhỏ hơn 50MB → tự động broadcast (không shuffle)
spark.sql.autoBroadcastJoinThreshold=52428800

# --- Dynamic Partition Overwrite ---
# Khi write partitioned data: chỉ overwrite đúng partition có data mới
# KHÔNG overwrite toàn bộ table — quan trọng cho compaction và incremental load
spark.sql.sources.partitionOverwriteMode=dynamic

# --- Serializer ---
# Kryo nhanh hơn Java default serializer ~10x
spark.serializer=org.apache.spark.serializer.KryoSerializer
spark.kryo.unsafe=true

# --- Shuffle ---
# Default 200, AQE sẽ tự adjust xuống nếu data nhỏ
spark.sql.shuffle.partitions=200

# --- Parquet ---
spark.sql.parquet.filterPushdown=true
spark.sql.parquet.enableVectorizedReader=true
spark.sql.parquet.mergeSchema=false

# --- Delta / Staging ---
# Ghi Parquet với Snappy compression mặc định
spark.sql.parquet.compression.codec=snappy
