version: "3.8"

# ============================================================
# MoMo Fraud Detection — Full Data Engineering Stack
# Services: HDFS + Hive + Spark + Trino + Airflow + Superset
#         + source-db (PostgreSQL — nguồn data thực tế)
#
# Startup order (dependency chain):
#   source-db → (data loaded by init scripts)
#   source-db → spark (JDBC ingest)
#   postgres (hive backend) → hive-metastore → hive-server
#   namenode → datanode
#   hive-metastore + namenode → spark-master → spark-worker
#   hive-metastore → trino
#   airflow-postgres → airflow-init → airflow-webserver + airflow-scheduler
#   trino → superset
# ============================================================

x-airflow-common: &airflow-common
  # Dùng YAML anchor để tránh lặp config giữa webserver và scheduler
  image: apache/airflow:2.8.1-python3.10
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nFmkQ="
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    # Spark connection — Airflow submit jobs lên Spark master
    SPARK_HOME: /opt/spark
    HADOOP_CONF_DIR: /opt/hadoop/conf
  volumes:
    - ../airflow/dags:/opt/airflow/dags
    - ../docker/hadoop/core-site.xml:/opt/hadoop/conf/core-site.xml:ro
    - ../docker/hadoop/hdfs-site.xml:/opt/hadoop/conf/hdfs-site.xml:ro
    - airflow_logs:/opt/airflow/logs
  depends_on:
    airflow-postgres:
      condition: service_healthy
  networks:
    - de_network

services:

  # ============================================================
  # SOURCE DATABASE — PostgreSQL (nguồn data, giả lập production DB)
  # CSV files được load vào đây trước, Spark đọc qua JDBC
  # Đây là pattern thực tế: data engineer không đọc file thô,
  # mà ingest từ database của hệ thống vận hành (operational DB)
  # ============================================================

  source-db:
    image: postgres:14-alpine
    container_name: source-db
    hostname: source-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: momo_source
      POSTGRES_USER: momo
      POSTGRES_PASSWORD: momo
    volumes:
      - source_db_data:/var/lib/postgresql/data
      - ../docker/source-db/init:/docker-entrypoint-initdb.d:ro
      # data/raw mount removed — CSV files will be copied into container manually
      # or use COPY in init script with files pre-staged in init folder
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U momo -d momo_source"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - de_network

  # ============================================================
  # HDFS — Distributed File System
  # ============================================================

  namenode:
    # Namenode: bộ não của HDFS
    # Lưu toàn bộ filesystem metadata trong RAM
    # Chỉ có 1 namenode (single point of failure — production dùng HA với standby namenode)
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    hostname: namenode
    ports:
      - "9870:9870"   # HDFS Web UI — xem files, health
      - "9000:9000"   # HDFS RPC — Spark/Hive connect vào đây
    environment:
      CLUSTER_NAME: de_cluster
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      HDFS_CONF_dfs_replication: 1
      HDFS_CONF_dfs_permissions_enabled: "false"
    volumes:
      - namenode_data:/hadoop/dfs/name
      - ../docker/hadoop/core-site.xml:/etc/hadoop/core-site.xml:ro
      - ../docker/hadoop/hdfs-site.xml:/etc/hadoop/hdfs-site.xml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9870"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - de_network

  datanode:
    # Datanode: nơi data thực sự được lưu dưới dạng blocks
    # Production: nhiều datanodes trên nhiều máy → replication + parallelism
    #
    # TIERED STORAGE SIMULATION:
    # Dùng 2 Docker volumes riêng biệt để giả lập SSD và HDD
    # Thực tế cả 2 đều trên cùng physical disk của host machine
    # Nhưng HDFS sẽ route data theo Storage Policy giống production thật
    #
    # Storage Policy:
    #   [SSD]  → /hadoop/dfs/data/ssd  → hot data (raw/, staging/)
    #   [DISK] → /hadoop/dfs/data/hdd  → warm/cold data
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    hostname: datanode
    ports:
      - "9864:9864"   # Datanode Web UI
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      HDFS_CONF_dfs_replication: 1
      HDFS_CONF_dfs_permissions_enabled: "false"
      # Khai báo 2 storage directories với type tag
      # [SSD] và [DISK] là storage type labels mà HDFS Storage Policy dùng
      HDFS_CONF_dfs_datanode_data_dir: >-
        [SSD]/hadoop/dfs/data/ssd,[DISK]/hadoop/dfs/data/hdd
    volumes:
      # Volume "ssd" — simulate SSD: raw + staging layer (hot data, query nhiều)
      - datanode_ssd:/hadoop/dfs/data/ssd
      # Volume "hdd" — simulate HDD: warm + cold layer (ít query, cost thấp hơn)
      - datanode_hdd:/hadoop/dfs/data/hdd
      - ../docker/hadoop/core-site.xml:/etc/hadoop/core-site.xml:ro
      - ../docker/hadoop/hdfs-site.xml:/etc/hadoop/hdfs-site.xml:ro
    depends_on:
      namenode:
        condition: service_healthy
    networks:
      - de_network

  # ============================================================
  # Hive — Table Catalog (Metastore) + Query Interface
  # ============================================================

  hive-metastore-db:
    image: postgres:13-alpine
    container_name: hive-metastore-db
    hostname: hive-metastore-db
    environment:
      POSTGRES_DB: metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
      # Force md5 auth — Hive's JDBC driver does not support scram-sha-256 (pg14+ default)
      POSTGRES_HOST_AUTH_METHOD: md5
    volumes:
      - hive_metastore_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - de_network

  hive-metastore:
    # Hive Metastore Thrift server
    # Expose port 9083 — Spark và Trino connect vào đây để đọc/ghi catalog
    # Khi Spark tạo table → thực ra là ghi vào PostgreSQL qua service này
    image: apache/hive:3.1.3
    container_name: hive-metastore
    hostname: hive-metastore
    ports:
      - "9083:9083"   # Thrift port
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://hive-metastore-db:5432/metastore
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hive
    volumes:
      - ../docker/hive/hive-site.xml:/opt/hive/conf/hive-site.xml:ro
      - ../docker/hadoop/core-site.xml:/opt/hadoop/conf/core-site.xml:ro
      - ../docker/hadoop/hdfs-site.xml:/opt/hadoop/conf/hdfs-site.xml:ro
    depends_on:
      hive-metastore-db:
        condition: service_healthy
      namenode:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9083 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 20
      start_period: 60s
    networks:
      - de_network

  hive-server:
    # HiveServer2 — expose JDBC endpoint (port 10000)
    # Dùng để chạy Hive queries trực tiếp (beeline CLI, JDBC clients)
    # Trino KHÔNG dùng cái này — Trino connect thẳng vào Metastore Thrift
    image: apache/hive:3.1.3
    container_name: hive-server
    hostname: hive-server
    ports:
      - "10000:10000"   # HiveServer2 JDBC
      - "10002:10002"   # HiveServer2 Web UI
    environment:
      SERVICE_NAME: hiveserver2
      SERVICE_OPTS: >-
        -Dhive.metastore.uris=thrift://hive-metastore:9083
    volumes:
      - ../docker/hive/hive-site.xml:/opt/hive/conf/hive-site.xml:ro
      - ../docker/hadoop/core-site.xml:/opt/hadoop/conf/core-site.xml:ro
    depends_on:
      hive-metastore:
        condition: service_healthy
    networks:
      - de_network

  # ============================================================
  # Apache Spark — Distributed Processing Engine
  # ============================================================

  spark-master:
    # apache/spark: official image, free, replaces bitnami/spark (now commercial)
    image: apache/spark:3.5.1
    container_name: spark-master
    hostname: spark-master
    user: root
    environment:
      SPARK_NO_DAEMONIZE: "true"
    command: >
      bash -c "
        /opt/spark/sbin/start-master.sh --host spark-master --port 7077 --webui-port 8080 &&
        tail -f /opt/spark/logs/*.out
      "
    ports:
      - "8081:8080"   # Spark Master Web UI
      - "7077:7077"   # Spark Master RPC
    volumes:
      - ../docker/spark/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ../docker/hadoop/core-site.xml:/opt/spark/conf/core-site.xml:ro
      - ../docker/hadoop/hdfs-site.xml:/opt/spark/conf/hdfs-site.xml:ro
      - ../docker/spark/jars:/opt/spark/extra-jars:ro
    depends_on:
      hive-metastore:
        condition: service_healthy
      source-db:
        condition: service_healthy
    networks:
      - de_network

  spark-worker:
    image: apache/spark:3.5.1
    container_name: spark-worker
    hostname: spark-worker
    user: root
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_WORKER_MEMORY: 4g
      SPARK_WORKER_CORES: "4"
    command: >
      bash -c "
        /opt/spark/sbin/start-worker.sh spark://spark-master:7077 &&
        tail -f /opt/spark/logs/*.out
      "
    volumes:
      - ../docker/spark/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ../docker/hadoop/core-site.xml:/opt/spark/conf/core-site.xml:ro
      - ../docker/hadoop/hdfs-site.xml:/opt/spark/conf/hdfs-site.xml:ro
      - ../docker/spark/jars:/opt/spark/extra-jars:ro
    depends_on:
      - spark-master
    networks:
      - de_network

  # ============================================================
  # Trino — Distributed SQL Query Engine
  # ============================================================

  trino:
    # Trino: MPP engine — nhận SQL, query Parquet trên HDFS qua Hive catalog
    # Không lưu data. Nhanh hơn Hive vì không dùng MapReduce
    # Superset và dbt connect vào đây
    image: trinodb/trino:435
    container_name: trino
    hostname: trino
    ports:
      - "8082:8080"   # Trino Web UI + REST API
    volumes:
      - ../docker/trino/config.properties:/etc/trino/config.properties:ro
      - ../docker/trino/catalog/hive.properties:/etc/trino/catalog/hive.properties:ro
      # Trino cần HDFS config để biết namenode address
      - ../docker/hadoop/core-site.xml:/etc/trino/hdfs/core-site.xml:ro
      - ../docker/hadoop/hdfs-site.xml:/etc/trino/hdfs/hdfs-site.xml:ro
    depends_on:
      hive-metastore:
        condition: service_healthy
      namenode:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 30s
      timeout: 10s
      retries: 10
    networks:
      - de_network

  # ============================================================
  # Apache Airflow — Orchestration
  # ============================================================

  airflow-postgres:
    # PostgreSQL riêng cho Airflow — lưu DAG metadata, task states, logs
    # Tách biệt với Hive Metastore DB — mỗi service dùng DB riêng
    image: postgres:14-alpine
    container_name: airflow-postgres
    hostname: airflow-postgres
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - de_network

  airflow-init:
    # Chạy một lần khi setup: tạo DB schema, tạo admin user
    # exitCode 0 → done, không restart
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db upgrade
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@momo.vn
    restart: "no"

  airflow-webserver:
    # Airflow Web UI — monitor DAGs, xem logs, trigger manually
    <<: *airflow-common
    container_name: airflow-webserver
    hostname: airflow-webserver
    command: webserver
    ports:
      - "8083:8080"   # Airflow Web UI
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  airflow-scheduler:
    # Airflow Scheduler — chạy ngầm, check DAGs, tạo task instances
    # Không có UI — chỉ là background process
    <<: *airflow-common
    container_name: airflow-scheduler
    hostname: airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ============================================================
  # Apache Superset — Business Intelligence / Visualization
  # ============================================================

  superset:
    # Superset: BI tool — kết nối vào Trino, tạo dashboards
    # Dùng SQLAlchemy Trino connector: trino://trino@trino:8080/hive
    image: apache/superset:3.1.0
    container_name: superset
    hostname: superset
    ports:
      - "8088:8088"   # Superset Web UI
    environment:
      SUPERSET_SECRET_KEY: "momo_de_project_secret_key_2024"
      SUPERSET_LOAD_EXAMPLES: "no"
      DATABASE_URL: "sqlite:////app/superset_home/superset.db"
    volumes:
      - superset_data:/app/superset_home
    command: >
      bash -c "
        superset db upgrade &&
        superset fab create-admin --username admin --firstname Admin --lastname User --email admin@momo.vn --password admin &&
        superset init &&
        superset run -h 0.0.0.0 -p 8088
      "
    depends_on:
      trino:
        condition: service_healthy
    networks:
      - de_network

# ============================================================
# Networks
# ============================================================
networks:
  de_network:
    # Bridge network: tất cả containers giao tiếp qua tên service
    # Không cần biết IP — Docker DNS tự resolve "namenode" → IP của namenode container
    driver: bridge
    name: de_network

# ============================================================
# Volumes — persistent storage
# ============================================================
volumes:
  # HDFS NameNode metadata
  namenode_data:
    name: de_namenode_data

  # HDFS DataNode — 2 volumes simulate tiered storage
  # Thực tế cùng physical disk nhưng HDFS route theo Storage Policy
  datanode_ssd:
    name: de_datanode_ssd    # [SSD] tag — hot data: raw/, staging/
  datanode_hdd:
    name: de_datanode_hdd    # [DISK] tag — warm/, cold/

  # Source DB persist (PostgreSQL — operational database)
  source_db_data:
    name: de_source_db_data

  # Hive Metastore schema persist
  hive_metastore_db:
    name: de_hive_metastore_db

  # Airflow state persist
  airflow_postgres_data:
    name: de_airflow_postgres_data
  airflow_logs:
    name: de_airflow_logs

  # Superset dashboard definitions persist
  superset_data:
    name: de_superset_data
