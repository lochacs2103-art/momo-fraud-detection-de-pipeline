version: "3.8"

# ============================================================
# MoMo Fraud Detection — Full Data Engineering Stack
# WSL2-compatible: config files baked into images via build context
# No bind-mounts for config files — avoids WSL2 read-only filesystem errors
# ============================================================

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1-python3.10
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nFmkQ="
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
  volumes:
    - airflow_logs:/opt/airflow/logs
  depends_on:
    airflow-postgres:
      condition: service_healthy
  networks:
    - de_network

services:

  # ── Source DB ────────────────────────────────────────────────────────
  source-db:
    image: postgres:14-alpine
    container_name: source-db
    hostname: source-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: momo_source
      POSTGRES_USER: momo
      POSTGRES_PASSWORD: momo
    volumes:
      - source_db_data:/var/lib/postgresql/data
      - ./source-db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U momo -d momo_source"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - de_network

  # ── HDFS ─────────────────────────────────────────────────────────────
  namenode:
    build:
      context: ./hadoop
      dockerfile: Dockerfile.namenode
    container_name: namenode
    hostname: namenode
    ports:
      - "9870:9870"
      - "9000:9000"
    environment:
      CLUSTER_NAME: de_cluster
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      HDFS_CONF_dfs_replication: 1
      HDFS_CONF_dfs_permissions_enabled: "false"
    volumes:
      - namenode_data:/hadoop/dfs/name
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9870"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - de_network

  datanode:
    build:
      context: ./hadoop
      dockerfile: Dockerfile.datanode
    container_name: datanode
    hostname: datanode
    ports:
      - "9864:9864"
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      HDFS_CONF_dfs_replication: 1
      HDFS_CONF_dfs_permissions_enabled: "false"
    volumes:
      - datanode_data:/hadoop/dfs/data
    depends_on:
      namenode:
        condition: service_healthy
    networks:
      - de_network

  # ── Hive ─────────────────────────────────────────────────────────────
  hive-metastore-db:
    image: postgres:13-alpine
    container_name: hive-metastore-db
    hostname: hive-metastore-db
    environment:
      POSTGRES_DB: metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
      POSTGRES_HOST_AUTH_METHOD: md5
    volumes:
      - hive_metastore_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - de_network

  hive-metastore:
    build:
      context: ./hive
      dockerfile: Dockerfile
    container_name: hive-metastore
    hostname: hive-metastore
    ports:
      - "9083:9083"
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://hive-metastore-db:5432/metastore
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hive
    depends_on:
      hive-metastore-db:
        condition: service_healthy
      namenode:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat /dev/null > /dev/tcp/localhost/9083' 2>/dev/null && exit 0 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 20
      start_period: 60s
    networks:
      - de_network

  hive-server:
    image: apache/hive:3.1.3
    container_name: hive-server
    hostname: hive-server
    ports:
      - "10000:10000"
      - "10002:10002"
    environment:
      SERVICE_NAME: hiveserver2
      SERVICE_OPTS: "-Dhive.metastore.uris=thrift://hive-metastore:9083"
    depends_on:
      hive-metastore:
        condition: service_healthy
    networks:
      - de_network

  # ── Spark ────────────────────────────────────────────────────────────
  spark-master:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: spark-master
    hostname: spark-master
    user: root
    environment:
      SPARK_NO_DAEMONIZE: "true"
    command: >
      bash -c "
        /opt/spark/sbin/start-master.sh --host spark-master --port 7077 --webui-port 8080 &&
        tail -f /opt/spark/logs/*.out
      "
    ports:
      - "8081:8080"
      - "7077:7077"
    volumes:
      - ./spark/jars:/opt/spark/extra-jars:ro
    depends_on:
      hive-metastore:
        condition: service_healthy
      source-db:
        condition: service_healthy
    networks:
      - de_network

  spark-worker:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: spark-worker
    hostname: spark-worker
    user: root
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_WORKER_MEMORY: 4g
      SPARK_WORKER_CORES: "4"
    command: >
      bash -c "
        /opt/spark/sbin/start-worker.sh spark://spark-master:7077 &&
        tail -f /opt/spark/logs/*.out
      "
    volumes:
      - ./spark/jars:/opt/spark/extra-jars:ro
    depends_on:
      - spark-master
    networks:
      - de_network

  # ── Trino ────────────────────────────────────────────────────────────
  trino:
    build:
      context: ./trino
      dockerfile: Dockerfile
    container_name: trino
    hostname: trino
    ports:
      - "8082:8080"
    depends_on:
      hive-metastore:
        condition: service_healthy
      namenode:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 30s
      timeout: 10s
      retries: 10
    networks:
      - de_network

  # ── Airflow ──────────────────────────────────────────────────────────
  airflow-postgres:
    image: postgres:14-alpine
    container_name: airflow-postgres
    hostname: airflow-postgres
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - de_network

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db upgrade
        airflow users create \
          --username admin --password admin \
          --firstname Admin --lastname User \
          --role Admin --email admin@momo.vn
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8083:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Superset ─────────────────────────────────────────────────────────
  superset:
    image: apache/superset:3.1.0
    container_name: superset
    hostname: superset
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: "momo_de_project_secret_key_2024"
      SUPERSET_LOAD_EXAMPLES: "no"
      DATABASE_URL: "sqlite:////app/superset_home/superset.db"
    volumes:
      - superset_data:/app/superset_home
    command: >
      bash -c "
        superset db upgrade &&
        superset fab create-admin --username admin --firstname Admin --lastname User --email admin@momo.vn --password admin &&
        superset init &&
        superset run -h 0.0.0.0 -p 8088
      "
    depends_on:
      trino:
        condition: service_healthy
    networks:
      - de_network

# ── Networks ─────────────────────────────────────────────────────────
networks:
  de_network:
    driver: bridge
    name: de_network

# ── Volumes ──────────────────────────────────────────────────────────
volumes:
  namenode_data:
    name: de_namenode_data
  datanode_data:
    name: de_datanode_data
  source_db_data:
    name: de_source_db_data
  hive_metastore_db:
    name: de_hive_metastore_db
  airflow_postgres_data:
    name: de_airflow_postgres_data
  airflow_logs:
    name: de_airflow_logs
  superset_data:
    name: de_superset_data
