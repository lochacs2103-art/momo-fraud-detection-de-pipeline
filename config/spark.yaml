# Spark configuration
# Được load bởi SparkSessionFactory trong ingestion/transformation jobs
#
# ⚠ QUAN TRỌNG: executor config phải khớp với Docker worker resources
# Docker worker: SPARK_WORKER_MEMORY=4G, SPARK_WORKER_CORES=4
# Rule: executor.memory + executor.memoryOverhead < SPARK_WORKER_MEMORY
#       executor.cores <= SPARK_WORKER_CORES

app_name: momo_fraud_pipeline
master: spark://spark-master:7077
# master: local[*]   # uncomment để chạy local

configs:
  # ── Hive Metastore ──────────────────────────────────────────
  spark.sql.catalogImplementation: hive
  spark.hive.metastore.uris: thrift://hive-metastore:9083

  # ── Executor Sizing (DEV — phù hợp Docker worker 4G/4cores) ─
  # executor.memory + memoryOverhead = 2g + 1g = 3g < 4g ✓
  # executor.cores = 2 <= 4 ✓
  # Tổng OS memory per executor = 3GB, worker có 4GB → có buffer cho OS
  spark.executor.memory:          "2g"     # JVM heap
  spark.executor.memoryOverhead:  "1g"     # off-heap: Python worker, JVM native
  spark.driver.memory:            "1g"
  spark.driver.memoryOverhead:    "512m"
  spark.executor.cores:           "2"      # 2 cores/executor, worker có 4 → tối đa 2 executors

  # ── Memory Fraction (Unified Memory Manager) ─────────────────
  # JVM heap layout:
  #   Reserved      = 300MB hardcoded
  #   Usable        ≈ 2g - 300MB = 1.7GB
  #   Unified Pool  = 1.7GB × 0.6 = ~1GB  → Storage + Execution
  #   User Memory   = 1.7GB × 0.4 = ~680MB → Python UDFs, user data
  spark.memory.fraction:          "0.6"
  spark.memory.storageFraction:   "0.3"    # ít cache → cho Execution nhiều room hơn

  # Off-heap Spark
  spark.memory.offHeap.enabled:   "true"
  spark.memory.offHeap.size:      "256m"   # giảm xuống cho dev

  # ── AQE ─────────────────────────────────────────────────────
  spark.sql.adaptive.enabled:                       "true"
  spark.sql.adaptive.coalescePartitions.enabled:    "true"
  spark.sql.adaptive.skewJoin.enabled:              "true"
  spark.sql.adaptive.advisoryPartitionSizeInBytes:  "134217728"  # 128MB

  # ── Broadcast ───────────────────────────────────────────────
  spark.sql.autoBroadcastJoinThreshold: "52428800"  # 50MB

  # ── Dynamic Partition Overwrite ─────────────────────────────
  spark.sql.sources.partitionOverwriteMode: dynamic

  # ── Dynamic Allocation ──────────────────────────────────────
  spark.dynamicAllocation.enabled:          "true"
  spark.dynamicAllocation.minExecutors:     "1"
  spark.dynamicAllocation.maxExecutors:     "2"     # dev: worker 4cores / 2cores per executor = 2
  spark.dynamicAllocation.initialExecutors: "1"

  # ── Speculation ─────────────────────────────────────────────
  spark.speculation:            "true"
  spark.speculation.multiplier: "1.5"

  # ── Serializer ──────────────────────────────────────────────
  spark.serializer:    org.apache.spark.serializer.KryoSerializer
  spark.kryo.unsafe:   "true"

  # ── Parquet ─────────────────────────────────────────────────
  spark.sql.parquet.filterPushdown:            "true"
  spark.sql.parquet.enableVectorizedReader:    "true"
  spark.sql.parquet.mergeSchema:               "false"
  spark.sql.parquet.compression.codec:         snappy
  spark.sql.parquet.blockSize:                 "134217728"
  spark.sql.parquet.pageSize:                  "1048576"
  spark.sql.parquet.dictionaryEncodingEnabled: "true"

  # ── Shuffle ─────────────────────────────────────────────────
  spark.sql.shuffle.partitions: "50"   # dev: ít data, giảm từ 200 xuống 50

# Target file size khi write
target_file_size_bytes: 134217728   # 128MB

# ── Production reference (không dùng ở đây) ────────────────────
# Cluster: 3 nodes × 32 cores × 128GB RAM
#   executor.memory:         "18g"
#   executor.memoryOverhead: "2g"    → 20g < 128g/6 executors ✓
#   executor.cores:          "5"     → 5 × 6 = 30 < 32 ✓
#   dynamicAllocation.maxExecutors: "18"
#   shuffle.partitions: "200"
